- case: call_tool_async_method
  main: |
    from rmote.protocol import Protocol, Tool

    class AsyncTool(Tool):
        @staticmethod
        async def async_add(a: int, b: int) -> int:
            return a + b

    async def test(proto: Protocol) -> None:
        result = await proto(AsyncTool.async_add, 5, 10)
        reveal_type(result)  # N: Revealed type is "builtins.int"
