- case: call_tool_basic
  main: |
    from rmote.protocol import Protocol, Tool

    class MyTool(Tool):
        @staticmethod
        def add(a: int, b: int) -> int:
            return a + b

    async def test(proto: Protocol) -> None:
        result = await proto(MyTool.add, 10, 20)
        reveal_type(result)  # N: Revealed type is "builtins.int"

- case: call_tool_string_return
  main: |
    from rmote.protocol import Protocol, Tool

    class MyTool(Tool):
        @staticmethod
        def greet(name: str) -> str:
            return f"Hello, {name}"

    async def test(proto: Protocol) -> None:
        result = await proto(MyTool.greet, "World")
        reveal_type(result)  # N: Revealed type is "builtins.str"

- case: call_tool_kwargs
  main: |
    from rmote.protocol import Protocol, Tool

    class MyTool(Tool):
        @staticmethod
